<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Hair Growth Analysis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .page { width: 100%; max-width: 420px; }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo-icon { width: 52px; height: 52px; background: #e8f0fe; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 26px; }
  .logo h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .logo p { font-size: 13px; color: #888; margin-top: 4px; }
  .card { background: #fff; border: 1px solid #eee; border-radius: 16px; padding: 2rem; }
  .card h2 { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 1.5rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
  .field-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .field-row label { font-size: 13px; color: #555; font-weight: 500; }
  .field-row a { font-size: 12px; color: #4f46e5; text-decoration: none; }
  .field input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 10px; background: #fff; color: #1a1a1a; transition: border-color 0.2s; }
  .field input:focus { outline: none; border-color: #4f46e5; }
  .face-box { border: 1px solid #ddd; border-radius: 10px; overflow: hidden; }
  .face-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .face-label label { font-size: 13px; color: #555; font-weight: 500; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #fef3c7; color: #92400e; font-weight: 500; }
  .scan-area { height: 180px; background: #f9f9f9; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; position: relative; overflow: hidden; }
  #login-video { width: 100%; height: 100%; object-fit: cover; display: none; }
  .scan-frame { width: 90px; height: 90px; position: relative; }
  .corner { position: absolute; width: 20px; height: 20px; border-color: #1a1a1a; border-style: solid; }
  .corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
  .scan-area p { font-size: 13px; color: #888; }
  .scan-area span { font-size: 11px; color: #bbb; }
  #login-preview { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; }
  .scan-bottom { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #fff; border-top: 1px solid #eee; }
  .scan-bottom span { font-size: 12px; color: #888; display: flex; align-items: center; gap: 6px; }
  .scan-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .scan-dot.active { background: #22c55e; }
  .scan-dot.captured { background: #4f46e5; }
  .scan-actions { display: flex; gap: 8px; }
  .scan-actions button { padding: 6px 14px; font-size: 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer; font-weight: 500; transition: background 0.2s; }
  .scan-actions button:hover { background: #f5f5f5; }
  .btn-primary { width: 100%; padding: 11px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 1.25rem; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .divider { text-align: center; margin: 1.25rem 0; font-size: 12px; color: #bbb; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #eee; }
  .divider::before { left: 0; } .divider::after { right: 0; }
  .link-row { text-align: center; font-size: 13px; color: #888; }
  .link-row a { color: #4f46e5; text-decoration: none; font-weight: 500; }
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; color: #fff; display: none; z-index: 999; }
  .toast.success { background: #22c55e; }
  .toast.error { background: #ef4444; }
  .loading { display: none; text-align: center; padding: 8px; font-size: 13px; color: #888; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  canvas { display: none; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="page">
  <div class="logo">
    <h1>Welcome back</h1>
    <p>Sign in to your account</p>
  </div>

  <div class="card">
    <h2>Sign in</h2>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="john@example.com">
    </div>

    <div class="field">
      <div class="field-row">
        <label>Password</label>
        <a href="#">Forgot password?</a>
      </div>
      <input type="password" id="password" placeholder="Your password">
    </div>

    <div class="field">
      <div class="face-label">
        <label>Face verification</label>
        <span class="badge">Required</span>
      </div>
      <div class="face-box">
        <div class="scan-area" id="scan-area">
          <video id="login-video" autoplay playsinline muted></video>
          <canvas id="login-canvas"></canvas>
          <img id="login-preview">
          <div id="scan-placeholder">
            <div class="scan-frame">
              <div class="corner tl"></div>
              <div class="corner tr"></div>
              <div class="corner bl"></div>
              <div class="corner br"></div>
            </div>
            <p>Face scan required</p>
            <span>Start camera to verify</span>
          </div>
        </div>
        <div class="scan-bottom">
          <span>
            <span class="scan-dot" id="scan-dot"></span>
            <span id="scan-status">Camera off</span>
          </span>
          <div class="scan-actions">
            <button onclick="startLoginCamera()">Start scan</button>
            <button onclick="captureLoginPhoto()">Capture</button>
          </div>
        </div>
      </div>
    </div>

    <div class="loading" id="loading">
      <span class="spinner"></span> Verifying face...
    </div>

    <button class="btn-primary" onclick="loginUser()" id="login-btn">Sign in</button>

    <div class="divider">or</div>
    <div class="link-row">Don't have an account? <a href="user/register">Create one</a></div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8000';
let stream = null;
let capturedBlob = null;

function stopLoginCamera() {
  const video = document.getElementById('login-video');
  if (video) {
    video.pause();
    video.srcObject = null;
  }
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

async function safePlay(video) {
  try {
    await video.play();
  } catch (e) {
    if (e?.name !== 'AbortError') {
      throw e;
    }
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

async function startLoginCamera() {
  try {
    stopLoginCamera();
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    const video = document.getElementById('login-video');
    video.srcObject = stream;
    await safePlay(video);
    video.style.display = 'block';
    document.getElementById('scan-placeholder').style.display = 'none';
    document.getElementById('login-preview').style.display = 'none';
    document.getElementById('scan-dot').className = 'scan-dot active';
    document.getElementById('scan-status').textContent = 'Camera active';
    capturedBlob = null;
  } catch (e) {
    showToast('Camera access denied!', 'error');
  }
}

function captureLoginPhoto() {
  const video = document.getElementById('login-video');
  const canvas = document.getElementById('login-canvas');
  if (!stream) { showToast('Start camera first!', 'error'); return; }
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => {
    capturedBlob = blob;
    const img = document.getElementById('login-preview');
    img.src = URL.createObjectURL(blob);
    img.style.display = 'block';
    img.style.position = 'absolute';
    img.style.inset = '0';
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.objectFit = 'cover';
    video.style.display = 'none';
    document.getElementById('scan-dot').className = 'scan-dot captured';
    document.getElementById('scan-status').textContent = 'Face captured ✓';
    stopLoginCamera();
  }, 'image/jpeg');
}

async function loginUser() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) { showToast('Email and password required!', 'error'); return; }
  if (!capturedBlob) { showToast('Face scan required!', 'error'); return; }

  const formData = new FormData();
  formData.append('email', email);
  formData.append('password', password);
  formData.append('face', capturedBlob, 'face.jpg');

  document.getElementById('login-btn').disabled = true;
  document.getElementById('loading').style.display = 'block';

  try {
    const res  = await fetch(`${API}/auth/login`, { method: 'POST', body: formData });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('user', JSON.stringify(data));
      showToast(`Welcome back ${data.name}! 👋`, 'success');
      setTimeout(() => window.location.href = '/ui/dashboard', 1500);
    } else {
      showToast(data.detail || 'Login failed!', 'error');
    }
  } catch (e) {
    showToast('Cannot connect to API!', 'error');
  }

  document.getElementById('login-btn').disabled = false;
  document.getElementById('loading').style.display = 'none';
}

window.addEventListener('beforeunload', stopLoginCamera);
</script>
</body>
</html>
