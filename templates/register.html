<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Hair Growth Analysis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .page { width: 100%; max-width: 480px; }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo-icon { width: 52px; height: 52px; background: #e8f0fe; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
  .logo-icon svg { width: 24px; height: 24px; stroke: #1d4ed8; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .logo h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .logo p { font-size: 13px; color: #888; margin-top: 4px; }
  .card { background: #fff; border: 1px solid #eee; border-radius: 16px; padding: 2rem; }
  .card h2 { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 1.5rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
  .field input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 10px; background: #fff; color: #1a1a1a; transition: border-color 0.2s; }
  .field input:focus { outline: none; border-color: #4f46e5; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .face-box { border: 1px solid #ddd; border-radius: 10px; overflow: hidden; }
  .cam-area { width: 100%; height: 200px; background: #f9f9f9; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; }
  #reg-video { width: 100%; height: 100%; object-fit: cover; display: none; }
  #reg-canvas { display: none; }
  .cam-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cam-icon { width: 44px; height: 44px; border: 2px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .cam-icon svg { width: 20px; height: 20px; stroke: #6b7280; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cam-area p { font-size: 13px; color: #888; }
  .face-actions { display: flex; gap: 8px; padding: 10px; border-top: 1px solid #eee; background: #fff; }
  .face-actions button { flex: 1; padding: 8px; font-size: 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer; font-weight: 500; transition: background 0.2s; }
  .face-actions button:hover { background: #f5f5f5; }
  .face-status { font-size: 11px; color: #888; padding: 8px 12px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .status-dot.active { background: #22c55e; }
  .status-dot.captured { background: #4f46e5; }
  .preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .btn-primary { width: 100%; padding: 11px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 1.25rem; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .divider { text-align: center; margin: 1.25rem 0; font-size: 12px; color: #bbb; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #eee; }
  .divider::before { left: 0; } .divider::after { right: 0; }
  .link-row { text-align: center; font-size: 13px; color: #888; }
  .link-row a { color: #4f46e5; text-decoration: none; font-weight: 500; }
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; color: #fff; display: none; z-index: 999; }
  .toast.success { background: #22c55e; }
  .toast.error { background: #ef4444; }
  .loading { display: none; text-align: center; padding: 8px; font-size: 13px; color: #888; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="page">
  <div class="logo">
    <div class="logo-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M12 4c2.2 0 4 1.8 4 4v2.5c0 1.5.7 2.9 1.9 3.8l.6.5H5.5l.6-.5c1.2-.9 1.9-2.3 1.9-3.8V8c0-2.2 1.8-4 4-4Z"/>
        <path d="M9 18c.4 1.2 1.5 2 3 2s2.6-.8 3-2"/>
      </svg>
    </div>
    <h1>Hair Growth Analysis</h1>
    <p>Create your account to get started</p>
  </div>

  <div class="card">
    <h2>Create account</h2>

    <div class="two-col">
      <div class="field">
        <label>First name</label>
        <input type="text" id="fname" placeholder="John">
      </div>
      <div class="field">
        <label>Last name</label>
        <input type="text" id="lname" placeholder="Doe">
      </div>
    </div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="john@example.com">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters">
    </div>

    <div class="field">
      <label>Face verification</label>
      <div class="face-box">
        <div class="cam-area" id="cam-area">
          <video id="reg-video" autoplay playsinline></video>
          <canvas id="reg-canvas"></canvas>
          <img id="preview-img" class="preview-img">
          <div class="cam-placeholder" id="cam-placeholder">
            <div class="cam-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12.5" r="3.2"/><path d="M8 6l1.2-2h5.6L16 6"/></svg></div>
            <p>Camera not started</p>
          </div>
        </div>
        <div class="face-actions">
          <button onclick="startCamera()">Start camera</button>
          <button onclick="capturePhoto()">Capture photo</button>
          <button onclick="uploadPhoto()">Upload photo</button>
        </div>
        <input type="file" id="face-file" accept="image/*" style="display:none" onchange="handleFileUpload(this)">
        <div class="face-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Camera not started</span>
        </div>
      </div>
    </div>

    <div class="loading" id="loading">
      <span class="spinner"></span> Registering...
    </div>

    <button class="btn-primary" onclick="registerUser()" id="reg-btn">
      Create account
    </button>

    <div class="divider">or</div>
    <div class="link-row">Already have an account? <a href="/">Sign in</a></div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8000';
const LAST_REGISTERED_FACE_KEY = 'lastRegisteredFaceUrl';
let stream = null;
let capturedBlob = null;

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

function getImageUrlFromPath(path) {
  if (!path) return null;
  if (path.startsWith('http://') || path.startsWith('https://')) return path;
  return `${API}/${String(path).replace(/^\/+/, '')}`;
}

function restoreLastFacePreview() {
  const savedUrl = localStorage.getItem(LAST_REGISTERED_FACE_KEY);
  if (!savedUrl) return;

  const img = document.getElementById('preview-img');
  img.src = savedUrl;
  img.style.display = 'block';
  document.getElementById('cam-placeholder').style.display = 'none';
  document.getElementById('reg-video').style.display = 'none';
  document.getElementById('status-dot').className = 'status-dot captured';
  document.getElementById('status-text').textContent = 'Last saved image loaded';
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    const video = document.getElementById('reg-video');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('cam-placeholder').style.display = 'none';
    document.getElementById('preview-img').style.display = 'none';
    document.getElementById('status-dot').className = 'status-dot active';
    document.getElementById('status-text').textContent = 'Camera active — position your face';
    capturedBlob = null;
  } catch (e) {
    showToast('Camera access denied!', 'error');
  }
}

function capturePhoto() {
  const video = document.getElementById('reg-video');
  const canvas = document.getElementById('reg-canvas');
  if (!stream) { showToast('Start camera first!', 'error'); return; }
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => {
    capturedBlob = blob;
    const img = document.getElementById('preview-img');
    img.src = URL.createObjectURL(blob);
    img.style.display = 'block';
    video.style.display = 'none';
    document.getElementById('status-dot').className = 'status-dot captured';
    document.getElementById('status-text').textContent = 'Photo captured ✓';
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }, 'image/jpeg');
}

function uploadPhoto() {
  document.getElementById('face-file').click();
}

function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  capturedBlob = file;
  const img = document.getElementById('preview-img');
  img.src = URL.createObjectURL(file);
  img.style.display = 'block';
  document.getElementById('cam-placeholder').style.display = 'none';
  document.getElementById('reg-video').style.display = 'none';
  document.getElementById('status-dot').className = 'status-dot captured';
  document.getElementById('status-text').textContent = `Photo ready: ${file.name}`;
}

async function registerUser() {
  const fname    = document.getElementById('fname').value.trim();
  const lname    = document.getElementById('lname').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!fname || !email || !password) { showToast('All fields required!', 'error'); return; }
  if (!capturedBlob) { showToast('Face photo required!', 'error'); return; }
  if (password.length < 8) { showToast('Password min 8 characters!', 'error'); return; }

  const formData = new FormData();
  formData.append('name', `${fname} ${lname}`);
  formData.append('email', email);
  formData.append('password', password);
  formData.append('face', capturedBlob, 'face.jpg');

  document.getElementById('reg-btn').disabled = true;
  document.getElementById('loading').style.display = 'block';

  try {
    const res  = await fetch(`${API}/auth/register`, { method: 'POST', body: formData });
    const data = await res.json();

    if (res.ok) {
      const savedFaceUrl = getImageUrlFromPath(data.face_url);
      if (savedFaceUrl) {
        localStorage.setItem(LAST_REGISTERED_FACE_KEY, savedFaceUrl);
      }
      showToast('Registration successful! ', 'success');
      setTimeout(() => window.location.href = '/', 1500);
    } else {
      showToast(data.detail || 'Registration failed!', 'error');
    }
  } catch (e) {
    showToast('Cannot connect to API!', 'error');
  }

  document.getElementById('reg-btn').disabled = false;
  document.getElementById('loading').style.display = 'none';
}

window.addEventListener('DOMContentLoaded', restoreLastFacePreview);
</script>
</body>
</html>
