<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hair Growth Analysis 💇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            position: relative;
        }

        .upload-area:hover {
            background: #f0f0ff;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-area .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .upload-area p {
            color: #667eea;
            font-weight: 600;
        }

        .upload-area .file-name {
            margin-top: 10px;
            color: #333;
            font-size: 0.9rem;
        }

        .preview-img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            border: 3px solid #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.5);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Result Box */
        .result-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            background: #f8f9ff;
            border-left: 4px solid #667eea;
        }

        .result-box.success {
            border-left-color: #28a745;
            background: #f0fff4;
        }

        .result-box.error {
            border-left-color: #dc3545;
            background: #fff0f0;
        }

        .result-box h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .analysis-text {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #444;
            font-size: 0.95rem;
        }

        /* Before After Images */
        .images-row {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .img-box {
            flex: 1;
            text-align: center;
        }

        .img-box p {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .img-box img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .confidence-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1> Hair Growth Analysis</h1>

    <div class="card">
        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('register')">
                 First Image Register
            </div>
            <div class="tab" onclick="switchTab('analyze')">
                 Hair Growth Analyze
            </div>
        </div>

        <!-- Register Tab -->
        <div class="tab-content active" id="tab-register">
            <h2> முதல் Image Register பண்ணு</h2>

            <div class="form-group">
                <label>User ID:</label>
                <input type="text" id="reg-user-id"
                       placeholder="உன் பெயர் போடு (eg: user001)">
            </div>

            <div class="form-group">
                <label>Head Image:</label>
                <div class="upload-area" id="reg-upload">
                    <input type="file" id="reg-file"
                           accept="image/*"
                           onchange="previewImage(this, 'reg-preview', 'reg-filename')">
                    <div class="icon">📷</div>
                    <p>Click பண்ணி Image Select பண்ணு</p>
                    <p class="file-name" id="reg-filename">No file selected</p>
                </div>
                <img id="reg-preview" class="preview-img">
            </div>

            <button onclick="registerUser()" id="reg-btn">
                Register பண்ணு
            </button>

            <div class="loading" id="reg-loading">
                <div class="spinner"></div>
                <p>Head detecting... Please wait </p>
            </div>

            <div class="result-box" id="reg-result"></div>
        </div>

        <!-- Analyze Tab -->
        <div class="tab-content" id="tab-analyze">
            <h2> Hair Growth Analyze பண்ணு</h2>

            <div class="form-group">
                <label>User ID:</label>
                <input type="text" id="ana-user-id"
                       placeholder="Register பண்ண User ID போடு">
            </div>

            <div class="form-group">
                <label>New Image (After):</label>
                <div class="upload-area">
                    <input type="file" id="ana-file"
                           accept="image/*"
                           onchange="previewImage(this, 'ana-preview', 'ana-filename')">
                    <div class="icon">🔍</div>
                    <p>New Image Select பண்ணு</p>
                    <p class="file-name" id="ana-filename">No file selected</p>
                </div>
                <img id="ana-preview" class="preview-img">
            </div>

            <button onclick="analyzeHair()" id="ana-btn">
                🔬 Analyze பண்ணு
            </button>

            <div class="loading" id="ana-loading">
                <div class="spinner"></div>
                <p>AI Analyzing hair growth... Please wait </p>
            </div>

            <div class="result-box" id="ana-result"></div>
        </div>
    </div>
</div>

<script>
    const API = "http://127.0.0.1:8000";

    // Tab Switch
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

        document.querySelector(`#tab-${tab}`).classList.add('active');
        event.target.classList.add('active');
    }

    // Image Preview
    function previewImage(input, previewId, filenameId) {
        const file = input.files[0];
        if (file) {
            document.getElementById(filenameId).textContent = file.name;
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById(previewId);
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    // Register
    async function registerUser() {
        const userId = document.getElementById('reg-user-id').value.trim();
        const file   = document.getElementById('reg-file').files[0];

        if (!userId || !file) {
            alert('User ID மற்றும் Image தேவை!');
            return;
        }

        const formData = new FormData();
        formData.append('user_id', userId);
        formData.append('file', file);

        document.getElementById('reg-btn').disabled     = true;
        document.getElementById('reg-loading').style.display = 'block';
        document.getElementById('reg-result').style.display  = 'none';

        try {
            const res  = await fetch(`${API}/first-image`, {
                method: 'POST', body: formData
            });
            const data = await res.json();

            const box = document.getElementById('reg-result');
            box.style.display = 'block';

            if (data.status === 'success') {
                box.className = 'result-box success';
                box.innerHTML = `
                    <h3> Register வெற்றி!
                        <span class="confidence-badge">
                            Confidence: ${(data.confidence * 100).toFixed(0)}%
                        </span>
                    </h3>
                    <p>User ID: <strong>${data.user_id}</strong></p>
                    <p>Image Stored: ${data.image_stored}</p>
                    <p>இப்போ Analyze tab-ல போய் new image upload பண்ணு!</p>
                `;
            } else {
                box.className = 'result-box error';
                box.innerHTML = `<h3> Error</h3><p>${data.error}</p>`;
            }
        } catch (err) {
            const box = document.getElementById('reg-result');
            box.style.display = 'block';
            box.className = 'result-box error';
            box.innerHTML = `<h3> Connection Error</h3>
                             <p>API running-ஆ இருக்கா check பண்ணு!</p>`;
        }

        document.getElementById('reg-btn').disabled     = false;
        document.getElementById('reg-loading').style.display = 'none';
    }

    // Analyze
    async function analyzeHair() {
        const userId = document.getElementById('ana-user-id').value.trim();
        const file   = document.getElementById('ana-file').files[0];

        if (!userId || !file) {
            alert('User ID மற்றும் Image தேவை!');
            return;
        }

        const formData = new FormData();
        formData.append('user_id', userId);
        formData.append('file', file);

        document.getElementById('ana-btn').disabled     = true;
        document.getElementById('ana-loading').style.display = 'block';
        document.getElementById('ana-result').style.display  = 'none';

        try {
            const res  = await fetch(`${API}/analyze`, {
                method: 'POST', body: formData
            });
            const data = await res.json();

            const box = document.getElementById('ana-result');
            box.style.display = 'block';

            if (data.status === 'success') {
                box.className = 'result-box success';
                box.innerHTML = `
                    <h3> Analysis Complete!
                        <span class="confidence-badge">
                            Confidence: ${(data.confidence * 100).toFixed(0)}%
                        </span>
                    </h3>
                    <hr style="margin: 15px 0; border-color: #ddd">
                    <h3>📊 Hair Growth Analysis:</h3>
                    <p class="analysis-text">${data.hair_analysis}</p>
                `;
            } else {
                box.className = 'result-box error';
                box.innerHTML = `<h3> Error</h3><p>${data.error}</p>`;
            }
        } catch (err) {
            const box = document.getElementById('ana-result');
            box.style.display = 'block';
            box.className = 'result-box error';
            box.innerHTML = `<h3> Connection Error</h3>
                             <p>API running-ஆ இருக்கா check பண்ணு!</p>`;
        }

        document.getElementById('ana-btn').disabled     = false;
        document.getElementById('ana-loading').style.display = 'none';
    }
</script>

</body>
</html>
