server {
    listen 80;
    server_name _;   # Replace with your domain for production, '_' is safe default

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Increase body size for image uploads (adjust as needed)
    client_max_body_size 20M;

    # Proxy to FastAPI running on uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if your app uses it)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running YOLO inference requests
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
    }

    # Serve persisted user images directly via Nginx
    location /storage/ {
        alias /opt/hair_ai_pro/storage/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Serve dashboard assets directly via Nginx
    location /ui/assets/ {
        alias /opt/hair_ai_pro/templates/assats/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
