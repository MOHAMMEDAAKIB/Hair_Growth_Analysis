server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;   # <-- replace with your Oracle VM IP or domain

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Increase body size for image uploads (adjust as needed)
    client_max_body_size 20M;

    # Proxy to FastAPI running on uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if your app uses it)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running YOLO inference requests
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # Serve static files directly via Nginx (faster than Python)
    location /static/ {
        alias /opt/hair_ai_pro/static/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
